<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="login-card card shadow-lg border-0 rounded-4">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="logo-circle bg-primary text-white d-inline-flex align-items-center justify-content-center rounded-circle mb-3 shadow-sm">
          <i class="bi bi-shield-lock-fill fs-2"></i>
        </div>
        <h2 class="fw-bold text-dark mb-1">Guardián Financiero IA</h2>
        <p class="text-muted">Plataforma inteligente antifraude</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center mb-4 rounded-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <div>{{ errorMessage }}</div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label for="email" class="form-label text-secondary fw-semibold">Correo Electrónico</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input type="email" id="email" class="form-control border-start-0 ps-0 bg-light focus-none" formControlName="email" placeholder="admin@guardian.com">
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label text-secondary fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
            <input type="password" id="password" class="form-control border-start-0 ps-0 bg-light focus-none" formControlName="password" placeholder="admin123">
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-semibold rounded-3 mb-3 d-flex justify-content-center align-items-center gap-2 shadow-sm" [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          {{ isLoading ? 'Ingresando...' : 'Iniciar Sesión' }}
        </button>
      </form>

      <div class="text-center mt-3">
        <small class="text-muted"><i class="bi bi-info-circle me-1"></i>Credenciales demo: admin&#64;guardian.com / admin123</small>
      </div>
    </div>
  </div>
</div>
