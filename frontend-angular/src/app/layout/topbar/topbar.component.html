<nav class="navbar navbar-expand bg-white px-4 py-3 shadow-sm sticky-top">
  <div class="container-fluid p-0">
    <!-- Título Dinámico -->
    <div class="d-flex align-items-center">
      <h4 class="mb-0 fw-bold text-dark">{{ pageTitle }}</h4>
    </div>

    <!-- Menú derecho -->
    <div class="d-flex ms-auto align-items-center">
      
      <!-- Theme Toggle -->
      <button class="btn btn-light rounded-circle p-2 me-3 position-relative btn-animate border-0" (click)="toggleTheme()" style="background-color: #f1f5f9; width: 40px; height: 40px;">
        <i class="bi fs-5 d-flex align-items-center justify-content-center" [ngClass]="isDarkMode ? 'bi-sun-fill text-warning' : 'bi-moon-fill text-primary'"></i>
      </button>

      <!-- Notifications (Mock) -->
      <button class="btn btn-light rounded-circle p-2 me-4 position-relative btn-animate border-0" style="background-color: #f1f5f9;">
        <i class="bi bi-bell fs-5 text-secondary"></i>
        <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">
          <span class="visually-hidden">Nuevas alertas</span>
        </span>
      </button>

      <!-- User Info -->
      <div class="d-none d-md-flex flex-column text-end me-3">
        <span class="fw-bold text-dark lh-1 mb-1">{{ currentUser?.fullName || 'Usuario' }}</span>
        <div>
          <span class="badge rounded-pill badge-in_review px-2" style="font-size: 0.65rem;">
            {{ roleBase || 'ANALISTA' }}
          </span>
        </div>
      </div>
      
      <!-- Dropdown -->
      <div class="dropdown">
        <button class="btn p-0 border-0 dropdown-toggle-hide shadow-sm rounded-circle profile-btn" 
                type="button" data-bs-toggle="dropdown" aria-expanded="false"
                style="width: 42px; height: 42px; overflow: hidden; background-color: #eff6ff;">
          <img *ngIf="avatarBase64" [src]="avatarBase64" alt="Avatar" class="w-100 h-100 object-fit-cover">
          <i *ngIf="!avatarBase64" class="bi bi-person-fill fs-4 text-primary d-flex align-items-center justify-content-center w-100 h-100"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-3 rounded-4 p-2 animate-dropdown">
          <li class="px-3 py-2 mb-2 bg-light rounded-3 d-md-none">
            <span class="fw-bold d-block">{{ currentUser?.fullName }}</span>
            <small class="text-muted">{{ currentUser?.email }}</small>
          </li>
          <li>
            <button class="dropdown-item rounded-3 py-2 d-flex align-items-center" (click)="goToProfile()">
              <i class="bi bi-person-badge text-primary me-3 fs-5"></i> Mi Perfil
            </button>
          </li>
          <li>
            <button class="dropdown-item rounded-3 py-2 d-flex align-items-center">
              <i class="bi bi-gear text-secondary me-3 fs-5"></i> Configuración
            </button>
          </li>
          <li><hr class="dropdown-divider my-2"></li>
          <li>
            <button class="dropdown-item rounded-3 py-2 text-danger fw-medium d-flex align-items-center" (click)="logout()">
              <i class="bi bi-box-arrow-right me-3 fs-5"></i> Cerrar Sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>
